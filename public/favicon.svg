<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background circle with amber border -->
  <circle cx="50" cy="50" r="48" fill="#0f172a" stroke="#f59e0b" stroke-width="3" />
  
  <!-- Curly hair background layer -->
  <circle cx="34" cy="35" r="14" fill="#1e1b4b" />
  <circle cx="66" cy="35" r="14" fill="#1e1b4b" />
  <circle cx="30" cy="48" r="12" fill="#1e1b4b" />
  <circle cx="70" cy="48" r="12" fill="#1e1b4b" />
  <circle cx="32" cy="62" r="11" fill="#1e1b4b" />
  <circle cx="68" cy="62" r="11" fill="#1e1b4b" />
  <circle cx="36" cy="74" r="9" fill="#1e1b4b" />
  <circle cx="64" cy="74" r="9" fill="#1e1b4b" />

  <!-- Shoulders / Blue Top -->
  <path d="M 25 85 C 25 72, 35 68, 50 68 C 65 68, 75 72, 75 85 Z" fill="#0284c7" />

  <!-- Silver Necklace -->
  <path d="M 42 66 C 45 72, 55 72, 58 66" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="50" cy="70" r="1.5" fill="#e2e8f0" />

  <!-- Neck -->
  <path d="M 42 55 L 42 66 C 42 66, 45 70, 50 70 C 55 70, 58 66, 58 66 L 58 55 Z" fill="#e8a27d" />

  <!-- Head/Face -->
  <ellipse cx="50" cy="44" rx="16" ry="19" fill="#f5b895" />

  <!-- Front Curly Hair Locks framing face -->
  <circle cx="36" cy="32" r="7" fill="#0f172a" />
  <circle cx="64" cy="32" r="7" fill="#0f172a" />
  <circle cx="34" cy="42" r="6" fill="#0f172a" />
  <circle cx="66" cy="42" r="6" fill="#0f172a" />
  <circle cx="35" cy="52" r="5" fill="#0f172a" />
  <circle cx="65" cy="52" r="5" fill="#0f172a" />
  
  <!-- Hair top -->
  <path d="M 34 32 C 34 20, 66 20, 66 32 Z" fill="#1e1b4b" />
  <circle cx="42" cy="24" r="6" fill="#0f172a" />
  <circle cx="50" cy="23" r="6" fill="#0f172a" />
  <circle cx="58" cy="24" r="6" fill="#0f172a" />

  <!-- Eyes -->
  <ellipse cx="44" cy="41" rx="2" ry="1.5" fill="#1e1b4b" />
  <ellipse cx="56" cy="41" rx="2" ry="1.5" fill="#1e1b4b" />
  
  <!-- Eyebrows (Curved) -->
  <path d="M 39 37 C 41 36, 46 37, 47 39" fill="none" stroke="#0f172a" stroke-width="1.2" stroke-linecap="round" />
  <path d="M 61 37 C 59 36, 54 37, 53 39" fill="none" stroke="#0f172a" stroke-width="1.2" stroke-linecap="round" />

  <!-- Nose -->
  <path d="M 49 43 C 49 46, 51 46, 51 43" fill="none" stroke="#e8a27d" stroke-width="1.5" stroke-linecap="round" />

  <!-- Happy Smile with white teeth! -->
  <!-- Outer mouth outline -->
  <path d="M 42 47 C 42 54, 58 54, 58 47 Z" fill="#991b1b" />
  <!-- White teeth -->
  <path d="M 43 47.5 C 45 50, 55 50, 57 47.5 Z" fill="#ffffff" />
</svg>
